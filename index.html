<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markerGroup = L.layerGroup().addTo(map);
    const redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });
    async function loadData() {
      // fetch the local Excel file
      const res = await fetch('data.xlsx');
      const arrayBuffer = await res.arrayBuffer();

      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      console.log(rows); // check your column names here

      const bounds = [];
      rows.forEach(row => {
        const lat = parseFloat(row.lat ?? row.Lat ?? row.latitude ?? row.Latitude);
        const lng = parseFloat(row.lng ?? row.Lng ?? row.lon ?? row.Longitude ?? row.longitude);
        const label = row.name ?? row.Name ?? '';

        if (!isNaN(lat) && !isNaN(lng)) {
          if (lat > -7) {

            L.marker([lat, lng], { icon: redIcon }).addTo(markerGroup).bindPopup(String(label));
            bounds.push([lat, lng]);
          }
          else {
            L.marker([lat, lng]).addTo(markerGroup).bindPopup(String(label));
            bounds.push([lat, lng]);
          }
        }
      });

      if (bounds.length) map.fitBounds(bounds);
    }

    loadData().catch(err => console.error('Failed to load data:', err));
  </script>
</body>

</html>
