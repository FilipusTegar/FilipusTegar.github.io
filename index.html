<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="code.js">
  </script>
  <div id="controls" style="position:absolute; top:10px; left:50px; z-index:1000;
     background:white; padding:6px 10px; border-radius:4px;
     box-shadow:0 1px 4px rgba(0,0,0,0.3); font:13px sans-serif;">
  <label for="scenario">Skenario: </label>
  <select id="scenario">
    <option value="Eksisting">Eksisting</option>
    <option value="Skenario A">Skenario A</option>
    <option value="Skenario B">Skenario B</option>
    <option value="Skenario C">Skenario C</option>
    <option value="Skenario D">Skenario D</option>
    <option value="Skenario A.1">Skenario A.1</option>
    <option value="Skenario A.2">Skenario A.2</option>
    <option value="Skenario C.1">Skenario C.1</option>
    <option value="Skenario C.1 Opt">Skenario C.1 Opt</option>
    <option value="Skenario D.1">Skenario D.1</option>
  </select>
</div>
</body>

</html>
